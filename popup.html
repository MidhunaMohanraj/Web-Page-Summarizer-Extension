<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageBrief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;  
      --border: #2a2a30;
      --accent: #7c6fef;
      --accent-dim: #3d3880;
      --text: #f0eff5;
      --muted: #8887a0;
      --success: #4ade80;
      --warn: #fbbf24;
      --danger: #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 380px;
      min-height: 200px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .settings-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      transition: all 0.15s;
    }
    .settings-btn:hover { border-color: var(--accent); color: var(--accent); }

    .main { padding: 16px; }

    /* Mode tabs */
    .tabs {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
      margin-bottom: 14px;
    }

    .tab {
      flex: 1;
      padding: 6px 0;
      background: none;
      border: none;
      border-radius: 5px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* Summarize button */
    .summarize-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .summarize-btn:hover { opacity: 0.88; }
    .summarize-btn:active { transform: scale(0.98); }
    .summarize-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* Output area */
    .output {
      margin-top: 14px;
      display: none;
    }
    .output.visible { display: block; }

    .output-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .summary-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }

    .summary-box::-webkit-scrollbar { width: 4px; }
    .summary-box::-webkit-scrollbar-track { background: transparent; }
    .summary-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Bullets list style */
    .summary-box ul { padding-left: 18px; }
    .summary-box li { margin-bottom: 6px; }

    .copy-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    /* Status states */
    .status {
      margin-top: 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.ok { background: var(--success); }
    .dot.err { background: var(--danger); }
    .dot.warn { background: var(--warn); }

    /* Settings panel */
    .settings-panel {
      display: none;
      padding: 16px;
    }
    .settings-panel.visible { display: block; }

    .field label {
      display: block;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }

    .save-btn {
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .save-btn:hover { opacity: 0.85; }

    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }
    .hint a { color: var(--accent); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .no-key-msg {
      text-align: center;
      padding: 20px 16px;
    }
    .no-key-msg p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .no-key-msg strong { color: var(--text); }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <span class="logo-text">PageBrief</span>
  </div>
  <button class="settings-btn" id="toggleSettings">API Key</button>
</div>

<!-- Settings panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="field">
    <label>Gemini API Key</label>
    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." />
  </div>
  <button class="save-btn" id="saveKey">Save Key</button>
  <p class="hint">
    Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> — no billing required.
  </p>
</div>

<!-- Main panel -->
<div class="main" id="mainPanel">

  <div id="noKeyMsg" class="no-key-msg" style="display:none;">
    <p>Add your <strong>free Gemini API key</strong> to start summarizing pages.</p>
    <button class="summarize-btn" id="goToSettings" style="width:auto; padding: 8px 20px;">Add API Key →</button>
  </div>

  <div id="readyPanel">
    <div class="tabs">
      <button class="tab active" data-mode="tldr">TL;DR</button>
      <button class="tab" data-mode="bullets">Bullets</button>
      <button class="tab" data-mode="eli5">ELI5</button>
    </div>

    <button class="summarize-btn" id="summarizeBtn">
      <span>✦</span> Summarize this page
    </button>

    <div id="statusArea"></div>

    <div class="output" id="outputArea">
      <div class="output-label">Summary</div>
      <div class="summary-box" id="summaryText"></div>
      <button class="copy-btn" id="copyBtn">copy</button>
    </div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
